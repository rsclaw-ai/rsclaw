# rsclaw defaults — provider, channel, and search engine definitions
#
# Edit this file to customize providers, channels, search engines, etc.
# Generated on first `rsclaw setup` and never overwritten.

# ──────────────────────────────────────────────────────────────────────────────
# Providers
# ──────────────────────────────────────────────────────────────────────────────

