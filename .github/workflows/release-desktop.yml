name: Release Desktop

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. app-v2026.4.6)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RSCLAW_BUILD_VERSION: ${{ inputs.tag || github.ref_name }}
  RSCLAW_BUILD_DATE: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

jobs:
  desktop:
    name: Desktop ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Resolve signing / notarization secrets from the `prod` environment.
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            sidecar_ext: ""
            bundle_ext: deb
            bundle_path: ui/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          - target: aarch64-unknown-linux-gnu
            # GitHub-hosted ARM64 Linux runner — no cross-compile toolchain needed.
            os: ubuntu-24.04-arm
            sidecar_ext: ""
            bundle_ext: deb
            bundle_path: ui/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
          - target: x86_64-apple-darwin
            os: macos-14
            sidecar_ext: ""
            bundle_ext: dmg
            bundle_path: ui/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - target: aarch64-apple-darwin
            os: macos-14
            sidecar_ext: ""
            bundle_ext: dmg
            bundle_path: ui/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            sidecar_ext: ".exe"
            bundle_ext: msi
            bundle_path: ui/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            sidecar_ext: ".exe"
            bundle_ext: msi
            bundle_path: ui/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install yarn
        run: npm install -g yarn

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      # Import Apple Developer ID cert into a temporary keychain so Tauri can
      # codesign + notarize non-interactively. The keychain is deleted with
      # the runner at job end.
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import $RUNNER_TEMP/cert.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          # Allow codesign to use the key without a GUI password prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm $RUNNER_TEMP/cert.p12
          security find-identity -v -p codesigning build.keychain

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build CLI sidecar
        run: cargo build --release --target ${{ matrix.target }}

      - name: Place sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ui/src-tauri/binaries
          cp target/${{ matrix.target }}/release/rsclaw${{ matrix.sidecar_ext }} \
             ui/src-tauri/binaries/rsclaw-${{ matrix.target }}${{ matrix.sidecar_ext }}

      - name: Place sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ui/src-tauri/binaries
          Copy-Item "target/${{ matrix.target }}/release/rsclaw${{ matrix.sidecar_ext }}" `
                    "ui/src-tauri/binaries/rsclaw-${{ matrix.target }}${{ matrix.sidecar_ext }}"

      - name: Install UI dependencies
        working-directory: ui
        run: yarn install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Build Tauri app
        working-directory: ui
        run: yarn tauri build --target ${{ matrix.target }}
        env:
          # Tauri reads these and signs the .app + .dmg during build.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # Notarization (optional but recommended — skip by leaving APPLE_ID unset).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Rename artifact
        shell: bash
        run: |
          # Strip "app-" prefix from tag for clean filename: app-v2026.4.6 -> v2026.4.6
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#app-}"
          for f in ${{ matrix.bundle_path }}; do
            dir=$(dirname "$f")
            ext="${f##*.}"
            mv "$f" "$dir/RsClaw-${VERSION}-${{ matrix.target }}.$ext"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: RsClaw-desktop-${{ matrix.target }}
          path: |
            ui/src-tauri/target/**/bundle/**/*RsClaw*${{ matrix.target }}*

  release:
    name: Create Desktop Release
    runs-on: ubuntu-latest
    needs: desktop
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten nested artifacts
        run: |
          find artifacts -mindepth 2 -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.deb" \) -exec mv {} artifacts/ \;

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum RsClaw-* 2>/dev/null > SHA256SUMS-desktop.txt || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/RsClaw-*
            artifacts/SHA256SUMS-desktop.txt
