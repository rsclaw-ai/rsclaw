name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RSCLAW_BUILD_VERSION: ${{ github.ref_name }}
  RSCLAW_BUILD_DATE: ${{ github.event.head_commit.timestamp }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rsclaw-${{ github.ref_name }}-${{ matrix.target }}.tar.gz rsclaw
          cd ../../..

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/rsclaw.exe" `
            -DestinationPath "rsclaw-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rsclaw-${{ matrix.target }}
          path: rsclaw-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

  desktop:
    name: Desktop ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            sidecar_ext: ""
            bundle_ext: deb
            bundle_path: ui/src-tauri/target/release/bundle/deb/*.deb
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            sidecar_ext: ""
            bundle_ext: deb
            bundle_path: ui/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            cross_target: aarch64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-14
            sidecar_ext: ""
            bundle_ext: dmg
            bundle_path: ui/src-tauri/target/release/bundle/dmg/*.dmg
          - target: aarch64-apple-darwin
            os: macos-14
            sidecar_ext: ""
            bundle_ext: dmg
            bundle_path: ui/src-tauri/target/release/bundle/dmg/*.dmg
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            sidecar_ext: ".exe"
            bundle_ext: msi
            bundle_path: ui/src-tauri/target/release/bundle/msi/*.msi
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            sidecar_ext: ".exe"
            bundle_ext: msi
            bundle_path: ui/src-tauri/target/release/bundle/msi/*.msi

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install yarn
        run: npm install -g yarn

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libwebkit2gtk-4.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      # Build the rsclaw CLI binary for this target
      - name: Build rsclaw binary (native)
        if: "!matrix.cross_target"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross_target
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build rsclaw binary (cross)
        if: matrix.cross_target
        run: cross build --release --target ${{ matrix.target }}

      # Place sidecar binary with Tauri naming convention
      - name: Place sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ui/src-tauri/binaries
          cp target/${{ matrix.target }}/release/rsclaw${{ matrix.sidecar_ext }} \
             ui/src-tauri/binaries/rsclaw-${{ matrix.target }}${{ matrix.sidecar_ext }}

      - name: Place sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ui/src-tauri/binaries
          Copy-Item "target/${{ matrix.target }}/release/rsclaw${{ matrix.sidecar_ext }}" `
                    "ui/src-tauri/binaries/rsclaw-${{ matrix.target }}${{ matrix.sidecar_ext }}"

      - name: Install UI dependencies
        working-directory: ui
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        working-directory: ui
        run: yarn tauri build --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          for f in ${{ matrix.bundle_path }}; do
            dir=$(dirname "$f")
            ext="${f##*.}"
            mv "$f" "$dir/RsClaw-${{ github.ref_name }}-${{ matrix.target }}.$ext"
          done

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: RsClaw-desktop-${{ matrix.target }}
          path: |
            ui/src-tauri/target/**/bundle/**/*RsClaw*${{ matrix.target }}*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, desktop]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum rsclaw-* RsClaw-* 2>/dev/null > SHA256SUMS.txt || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/rsclaw-*
            artifacts/RsClaw-*
            artifacts/SHA256SUMS.txt

