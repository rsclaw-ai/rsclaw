[build]
# sccache caches rustc invocations across projects and worktrees.
# Biggest win: switching git worktrees (each has its own target/) — sccache
# shares the rustc cache so the new worktree doesn't recompile from scratch.
# Install: brew install sccache. Inspect: sccache --show-stats.
# Opt-in per-shell: export RUSTC_WRAPPER=sccache
# (Kept opt-in so CI runners without sccache installed don't fail to start rustc.)
# rustc-wrapper = "sccache"

[alias]
# Developer-local release — thin LTO + 16 codegen units. Builds much faster
# than `--release` at a small runtime cost. Use for local dogfooding.
brd = "build --profile release-dev"
rrd = "run --profile release-dev --"

# CI-grade release — catches release-only issues without fat LTO.
brc = "build --profile ci"

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
